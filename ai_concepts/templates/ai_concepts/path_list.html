{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Course Catalog</title>
    <link rel="stylesheet" href="{% static 'portfolio/css/output.css' %}">
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-8">
            AI Learning Paths
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for course in courses %}
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 hover:border-blue-500 transition-colors">
                <h2 class="text-xl font-bold mb-2">{{ course.title }}</h2>
                <span class="inline-block bg-blue-900 text-blue-200 text-xs px-2 py-1 rounded mb-4 uppercase tracking-wider">
                    {{ course.level }}
                </span>
                <p class="text-slate-400 text-sm mb-6 line-clamp-3">
                    {{ course.description }}
                </p>
                <a href="{% url 'ai_concepts:path_detail' course.slug %}" class="inline-block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded transition-colors">
                    View Syllabus
                </a>
            </div>
            {% empty %}
            <div class="col-span-full text-center py-12 text-slate-500">
                No courses generated yet. Run the AI command!
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
